<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fd6bbc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#fd6bbc"/>
      <stop offset="100%" stop-color="#ff3b9d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="#070707"/>
  <rect width="600" height="600" fill="url(#bgGlow)"/>

  <!-- Vinyl Record Graphic Background -->
  <circle cx="300" cy="270" r="190" fill="none" stroke="#151515" stroke-width="24"/>
  <circle cx="300" cy="270" r="150" fill="none" stroke="#1c1c1c" stroke-width="12"/>
  <circle cx="300" cy="270" r="110" fill="none" stroke="#252525" stroke-width="8"/>
  <circle cx="300" cy="270" r="70" fill="none" stroke="#fd6bbc" stroke-width="2" opacity="0.4" filter="url(#glow)"/>

  <!-- Equalizer Waveform Lines -->
  <g opacity="0.3" transform="translate(150, 410)">
    <rect x="0" y="0" width="8" height="40" rx="4" fill="#fd6bbc"/>
    <rect x="20" y="-15" width="8" height="70" rx="4" fill="#fd6bbc"/>
    <rect x="40" y="-30" width="8" height="100" rx="4" fill="#fd6bbc"/>
    <rect x="60" y="-10" width="8" height="60" rx="4" fill="#fd6bbc"/>
    <rect x="80" y="-45" width="8" height="130" rx="4" fill="#fd6bbc"/>
    <rect x="100" y="-20" width="8" height="80" rx="4" fill="#fd6bbc"/>
    <rect x="120" y="-55" width="8" height="150" rx="4" fill="#fd6bbc"/>
    <rect x="140" y="-25" width="8" height="90" rx="4" fill="#fd6bbc"/>
    <rect x="160" y="-40" width="8" height="120" rx="4" fill="#fd6bbc"/>
    <rect x="180" y="-15" width="8" height="70" rx="4" fill="#fd6bbc"/>
    <rect x="200" y="-35" width="8" height="110" rx="4" fill="#fd6bbc"/>
    <rect x="220" y="-10" width="8" height="60" rx="4" fill="#fd6bbc"/>
    <rect x="240" y="-25" width="8" height="90" rx="4" fill="#fd6bbc"/>
    <rect x="260" y="-5" width="8" height="50" rx="4" fill="#fd6bbc"/>
    <rect x="280" y="-20" width="8" height="80" rx="4" fill="#fd6bbc"/>
    <rect x="300" y="0" width="8" height="40" rx="4" fill="#fd6bbc"/>
  </g>

  <!-- Content Typography -->
  <text x="300" y="110" font-family="'Outfit', sans-serif" font-size="20" font-weight="900" fill="#fd6bbc" letter-spacing="6" text-anchor="middle">OFFICIAL SINGLE</text>
  
  <text x="300" y="260" font-family="'Outfit', sans-serif" font-size="64" font-weight="900" fill="url(#pink-gradient)" letter-spacing="2" text-anchor="middle" filter="url(#glow)" style="fill: #ffffff;">SAI RỒI</text>

  <text x="300" y="320" font-family="'Outfit', sans-serif" font-size="28" font-weight="800" fill="#fd6bbc" letter-spacing="4" text-anchor="middle">KHÔI VŨ</text>

  <!-- Border Frame -->
  <rect x="30" y="30" width="540" height="540" fill="none" stroke="#fd6bbc" stroke-width="2" opacity="0.3" rx="16"/>
  <rect x="45" y="45" width="510" height="510" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1" rx="12"/>

  <!-- Bottom Metric Badge -->
  <rect x="180" y="490" width="240" height="44" rx="22" fill="#141414" stroke="#fd6bbc" stroke-width="1.5"/>
  <text x="300" y="518" font-family="'Plus Jakarta Sans', sans-serif" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">🔥 10.0M+ VIEWS • #1 VIRAL</text>
</svg>
