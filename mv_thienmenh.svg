<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlowTM" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fd6bbc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="1"/>
    </radialGradient>
    <filter id="glowTM">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="#070707"/>
  <rect width="600" height="600" fill="url(#bgGlowTM)"/>

  <!-- Geometric Glowing Wings Graphic -->
  <path d="M120 280 Q 200 150, 300 240 Q 400 150, 480 280 Q 380 220, 300 320 Q 220 220, 120 280 Z" fill="none" stroke="#fd6bbc" stroke-width="4" filter="url(#glowTM)" opacity="0.8"/>
  <path d="M150 310 Q 220 200, 300 270 Q 380 200, 450 310 Q 370 250, 300 350 Q 230 250, 150 310 Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>

  <!-- Studio Mic Graphic -->
  <circle cx="300" cy="220" r="45" fill="#141414" stroke="#fd6bbc" stroke-width="3" filter="url(#glowTM)"/>
  <circle cx="300" cy="220" r="30" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>

  <!-- Content Typography -->
  <text x="300" y="100" font-family="'Outfit', sans-serif" font-size="20" font-weight="900" fill="#fd6bbc" letter-spacing="6" text-anchor="middle">OFFICIAL MUSIC VIDEO</text>
  
  <text x="300" y="380" font-family="'Outfit', sans-serif" font-size="58" font-weight="900" fill="#ffffff" letter-spacing="3" text-anchor="middle" filter="url(#glowTM)">THIÊN MỆNH</text>

  <text x="300" y="435" font-family="'Outfit', sans-serif" font-size="24" font-weight="800" fill="#fd6bbc" letter-spacing="3" text-anchor="middle">QUÂN A.P ft. HẢI ĐĂNG DOO</text>

  <!-- Border Frame -->
  <rect x="30" y="30" width="540" height="540" fill="none" stroke="#fd6bbc" stroke-width="2" opacity="0.3" rx="16"/>
  <rect x="45" y="45" width="510" height="510" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1" rx="12"/>

  <!-- Bottom Metric Badge -->
  <rect x="160" y="490" width="280" height="44" rx="22" fill="#141414" stroke="#fd6bbc" stroke-width="1.5"/>
  <text x="300" y="518" font-family="'Plus Jakarta Sans', sans-serif" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">🔥 3.5M+ VIEWS • #2 TRENDING</text>
</svg>
