<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlowND" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fd6bbc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="1"/>
    </radialGradient>
    <filter id="glowND">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="#070707"/>
  <rect width="600" height="600" fill="url(#bgGlowND)"/>

  <!-- Sound Waves & Film Reel Graphic -->
  <g stroke="#fd6bbc" stroke-width="2" fill="none" opacity="0.4" filter="url(#glowND)">
    <circle cx="300" cy="220" r="140" stroke-dasharray="8,8"/>
    <circle cx="300" cy="220" r="100"/>
    <circle cx="300" cy="220" r="60"/>
    <circle cx="300" cy="220" r="20"/>
  </g>

  <!-- Content Typography -->
  <text x="300" y="90" font-family="'Outfit', sans-serif" font-size="20" font-weight="900" fill="#fd6bbc" letter-spacing="6" text-anchor="middle">OFFICIAL MUSIC VIDEO</text>
  
  <text x="300" y="340" font-family="'Outfit', sans-serif" font-size="34" font-weight="900" fill="#ffffff" letter-spacing="2" text-anchor="middle" filter="url(#glowND)">NHÌN EM ĐI CÒN LÀ EM KHÔNG</text>

  <text x="300" y="400" font-family="'Outfit', sans-serif" font-size="26" font-weight="800" fill="#fd6bbc" letter-spacing="4" text-anchor="middle">PHẠM ANH DUY</text>

  <!-- Border Frame -->
  <rect x="30" y="30" width="540" height="540" fill="none" stroke="#fd6bbc" stroke-width="2" opacity="0.3" rx="16"/>
  <rect x="45" y="45" width="510" height="510" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1" rx="12"/>

  <!-- Bottom Metric Badge -->
  <rect x="170" y="490" width="260" height="44" rx="22" fill="#141414" stroke="#fd6bbc" stroke-width="1.5"/>
  <text x="300" y="518" font-family="'Plus Jakarta Sans', sans-serif" font-size="16" font-weight="800" fill="#ffffff" text-anchor="middle">🔥 2.0M+ VIEWS • OFFICIAL MV</text>
</svg>
